<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>StudentInfo</title>

  <link 
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    rel="stylesheet"
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  >

  <link 
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  >

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header class="bg-primary text-white p-4">
    <h1>Student task</h1>
  </header>

  <div class="container-fluid mt-4">

    <div class="row">

      <!-- Form Section -->
      <div class="col-md-4 mb-4">

        <div class="card">

          <div class="card-body">

            <form id="stuForm">

              <div class="mb-3">

                <label for="firstName" class="visually-hidden">
                  First Name
                </label>

                <input
                  type="text"
                  id="fName"
                  class="form-control"
                  placeholder="Enter The Fname"
                  required
                >

              </div>

              <div class="mb-3">

                <label for="lastName" class="visually-hidden">
                  Last Name
                </label>

                <input
                  type="text"
                  id="lName"
                  class="form-control"
                  placeholder="Enter The Lname"
                  required
                >

              </div>

              <div class="mb-3">

                <label for="Email" class="visually-hidden">
                  Email
                </label>

                <input
                  type="email"
                  id="Email"
                  class="form-control"
                  placeholder="Enter The Email"
                  required
                >

              </div>

              <div class="mb-3">

                <label for="contact" class="visually-hidden">
                  Contact
                </label>

                <input
                  type="number"
                  id="contact"
                  class="form-control"
                  placeholder="Contact"
                  required
                >

              </div>

              <button 
                type="submit"
                id="addStdBtn" 
                class="btn btn-primary w-100">
                Add Student
              </button>
              
              <button 
                type="button" 
                id="updateStdBtn"
                class=" d-none btn btn-primary w-100">
                Update Student
              </button>

            </form>

          </div>

        </div>

      </div>

      <!-- Table Section -->
      <div class="col-md-8">

        <div class="card">

          <div class="card-body table-responsive">

            <table class="table table-bordered m-0">

              <thead>

                <tr>
              
                  <th>Sr.no</th>
                  <th>Full Name</th>
                  <th>Email</th>
                  <th>Contact</th>
                  <th>Edit</th>
                  <th>Remove</th>
                </tr>

              </thead>

              <tbody id="stdContainer"></tbody>

            </table>

          </div>

        </div>

      </div>

    </div>

  </div>

  <script src="app.js"></script>

</body>

</html>
